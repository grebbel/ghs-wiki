<style>

<div id="root"></div>
<div id="err" style="display:none;position:fixed;top:0;left:0;right:0;padding:16px;background:#7f1d1d;color:#fee2e2;font-family:ui-monospace,monospace;font-size:12px;white-space:pre-wrap;z-index:9999;max-height:50vh;overflow:auto"></div>
<script>
  function showErr(msg) {
    var el = document.getElementById("err");
    if (!el) return;
    el.style.display = "block";
    el.textContent = (el.textContent ? el.textContent + "\n\n" : "") + msg;
  }
  window.addEventListener("error", function (e) {
    showErr("Error: " + (e.error && e.error.stack ? e.error.stack : e.message));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showErr("Unhandled rejection: " + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
  });
</script>

<script type="module">
import React, { useState, useRef, useEffect, useMemo } from "react"
import { createRoot } from "react-dom/client"
import { motion, AnimatePresence } from "motion/react"
import htm from "htm"

const html = htm.bind(React.createElement)

const QUERIES = [
  {
    id: "common",
    label: "Common knowledge",
    text: "What is the capital of France?",
    pathHint: ["q", "n1", "n3", "ans"],
    answers: {
      llm:  { status: "success", text: "Paris.",                                                    note: "Memorized in training.",
              takeaway: "Pre-cutoff public knowledge lives inside the model. Cheapest possible answer — but only works for general facts." },
      rag:  { status: "success", text: 'Paris.\n[src: geo-atlas.md §1]',                            note: "Retrieved geographic doc.",
              takeaway: "For common knowledge RAG is overkill — the model knew already. You're paying for a retrieval layer that adds nothing here." },
      kg:   { status: "success", text: "France ⟶ capital_of ⟶ Paris",                              note: "Single typed edge.",
              takeaway: "One typed edge is all it takes. The schema investment doesn't pay off yet — it only earns its keep on multi-relation queries." },
      wiki: { status: "success", text: "# Paris\n- Capital of France\n- Pop. 2.1M",                 note: "Pre-cooked entity card.",
              takeaway: "The entity-card was already assembled by agents. The answer comes pre-cited, with timestamp and source." },
    },
  },
  {
    id: "proprietary",
    label: "Proprietary · recent",
    text: "What were Q3 2026 sales for our Drug A line?",
    pathHint: ["q", "n2", "n4", "ans"],
    answers: {
      llm:  { status: "fail",      text: "I don't have access to internal financial data.",         note: "Training cutoff & no external access.",
              takeaway: "Internal post-cutoff data simply doesn't exist in the model. No memory, no answer — it breaks ungrounded." },
      rag:  { status: "success",   text: "€4.2M in Q3 2026.\n[src: q3-2026-report.pdf p.7]",        note: "Retrieved internal doc indexed today.",
              takeaway: "RAG shines here: new docs indexed yesterday, answer with source citation. Classic RAG territory." },
      kg:   { status: "fail",      text: "No 'sales' relation in schema.",                          note: "Domain not modeled.",
              takeaway: "You'd first need to extend the schema with 'sales' relations. High prep cost; not justified for every ad-hoc question." },
      wiki: { status: "success",   text: "# Q3 2026 Sales · Drug A\n- Revenue: €4.2M\n- Updated 1d ago", note: "Agents kept the wiki fresh.",
              takeaway: "Agents refreshed the card overnight. Works for rolling figures — provided the ingest pipeline runs." },
    },
  },
  {
    id: "multihop",
    label: "Multi-hop · relational",
    text: "Which Drug A side effects also occur with Drug B?",
    pathHint: ["q", "n2", "n5", "n6", "ans"],
    answers: {
      llm:  { status: "uncertain", text: "Both may cause nausea... (unverified)",                   note: "Plausible but ungrounded.",
              takeaway: "Plausible but ungrounded — the model guesses on pattern alone. This is where hallucinations look like facts." },
      rag:  { status: "partial",   text: "Drug A: [nausea, headache]\nDrug B: [headache, fatigue]", note: "Retrieves both — but side-effect extraction from prose is error-prone.",
              takeaway: "Both docs found, but extracting side-effects from prose is error-prone. RAG breaks down at multi-hop reasoning." },
      kg:   { status: "success",   text: "{ headache }",                                            note: "Deterministic intersection via 'causes' edges.",
              takeaway: "Intersection computed on the graph itself, deterministically. No LLM call needed for the reasoning." },
      wiki: { status: "success",   text: "{ headache }",                                            note: "Two structured cards intersected in context.",
              takeaway: "Two structured cards loaded together in context; the intersection is readable instead of extracted from prose." },
    },
  },
]

const LLM_TILES = [
  { text: "Paris = capital · FR",       matches: ["common"] },
  { text: "France · pop ~67M",          matches: ["common"] },
  { text: "geography · general",        matches: ["common"] },
  { text: "Drug A · indication pain",   matches: ["multihop"] },
  { text: "Drug A · side-fx prose",     matches: ["multihop"] },
  { text: "Drug B · side-fx prose",     matches: ["multihop"] },
  { text: "common drug interactions",   matches: [] },
  { text: "??? Q3 2026 sales",          matches: [],         post_cutoff: true,  query_target: "proprietary" },
  { text: "??? Drug A × B compare",     matches: [],         post_cutoff: true,  query_target: "multihop" },
]

const DOCS = [
  { name: "geo-atlas.md",       kind: "md",  rel: { common: 0.93, proprietary: 0.02, multihop: 0.03 } },
  { name: "drug-a-label.pdf",   kind: "pdf", rel: { common: 0.02, proprietary: 0.11, multihop: 0.91 } },
  { name: "drug-b-label.pdf",   kind: "pdf", rel: { common: 0.02, proprietary: 0.10, multihop: 0.87 } },
  { name: "q3-2026-report.pdf", kind: "pdf", rel: { common: 0.03, proprietary: 0.96, multihop: 0.05 } },
  { name: "pharma-handbook.md", kind: "md",  rel: { common: 0.04, proprietary: 0.07, multihop: 0.42 } },
  { name: "policy.pdf",         kind: "pdf", rel: { common: 0.02, proprietary: 0.31, multihop: 0.04 } },
]

const WIKI_CARDS = [
  { name: "Paris",     fields: ["capital_of: France", "pop: 2.1M"],         updated: "3d", matches: ["common"] },
  { name: "France",    fields: ["capital: Paris", "pop: 67M"],              updated: "1w", matches: ["common"] },
  { name: "Drug A",    fields: ["side_fx:", "  [nausea, headache]"],        updated: "1d", matches: ["multihop"] },
  { name: "Drug B",    fields: ["side_fx:", "  [headache, fatigue]"],       updated: "1d", matches: ["multihop"] },
  { name: "Q3 Sales",  fields: ["drug_a: €4.2M", "drug_b: €3.1M"],          updated: "1d", matches: ["proprietary"] },
  { name: "Company",   fields: ["fy2026: ongoing"],                          updated: "2d", matches: ["proprietary"] },
]

const KG_NODES = [
  { id: "q",   x: 120, y:  25, r: 10, label: "Query",    kind: "input"  },
  { id: "n1",  x:  50, y:  95, r:  9, label: "France",   kind: "entity" },
  { id: "n2",  x: 190, y:  95, r:  9, label: "Drug A",   kind: "entity" },
  { id: "n3",  x:  30, y: 160, r:  9, label: "Paris",    kind: "entity" },
  { id: "n4",  x: 120, y: 160, r:  8, label: "nausea",   kind: "metric" },
  { id: "n5",  x: 210, y: 160, r:  9, label: "headache", kind: "metric" },
  { id: "n6",  x: 210, y: 220, r:  9, label: "Drug B",   kind: "entity" },
  { id: "ans", x: 120, y: 265, r: 11, label: "Answer",   kind: "output" },
]
const KG_EDGES = [
  { from: "q",   to: "n1", type: "queries"    },
  { from: "q",   to: "n2", type: "queries"    },
  { from: "n1",  to: "n3", type: "capital_of" },
  { from: "n2",  to: "n4", type: "causes"     },
  { from: "n2",  to: "n5", type: "causes"     },
  { from: "n6",  to: "n5", type: "causes"     },
  { from: "n6",  to: "n4", type: "causes"     },
  { from: "n3",  to: "ans",type: "informs"    },
  { from: "n5",  to: "ans",type: "informs"    },
  { from: "n4",  to: "ans",type: "informs"    },
]
const KIND_RING = {
  input:  "var(--ink)",
  entity: "var(--ink-soft)",
  metric: "var(--orange)",
  output: "var(--grounded)",
}

const STATUS = {
  success:   { label: "GROUNDED",   cls: "grounded",   bg: "var(--reply-ok)"      },
  partial:   { label: "PARTIAL",    cls: "partial",    bg: "var(--reply-partial)" },
  uncertain: { label: "UNGROUNDED", cls: "ungrounded", bg: "var(--reply-fail)"    },
  fail:      { label: "UNGROUNDED", cls: "ungrounded", bg: "var(--reply-fail)"    },
}

function edgesOnPath(pathIds) {
  const out = []
  for (let i = 0; i < pathIds.length - 1; i++) {
    const a = pathIds[i], b = pathIds[i + 1]
    const idx = KG_EDGES.findIndex(e => (e.from === a && e.to === b) || (e.from === b && e.to === a))
    if (idx >= 0) out.push(idx)
  }
  return out
}

const ReplyBox = ({ answer, delay = 0.9, replayKey }) => {
  if (!answer) return null
  const s = STATUS[answer.status]
  return html`
    <${React.Fragment}>
      <${motion.div}
        key=${`reply-${replayKey}`}
        className="reply-box"
        style=${{ background: s.bg }}
        initial=${{ opacity: 0, y: 6 }}
        animate=${{ opacity: 1, y: 0 }}
        transition=${{ delay, type: "spring", visualDuration: 0.42, bounce: 0.18 }}
      >
        <pre className="reply-text">${answer.text}</pre>
        <div className="reply-note">${answer.note}</div>
      </${motion.div}>
      <${motion.div}
        key=${`badge-${replayKey}`}
        className=${`status-badge ${s.cls}`}
        initial=${{ opacity: 0, x: 24 }}
        animate=${{ opacity: 1, x: 0 }}
        transition=${{ delay: delay + 0.15, type: "spring", visualDuration: 0.35, bounce: 0.2 }}
      >
        ${s.label}
      </${motion.div}>
    </${React.Fragment}>
  `
}

const ColumnHeader = ({ num, name, sub, replayKey }) => html`
  <${motion.h2}
    key=${`num-${replayKey}-${num}`}
    className="col-num"
    initial=${{ color: "var(--orange)" }}
    animate=${{ color: ["var(--orange)", "#FF8B6E", "var(--orange)"] }}
    transition=${{ delay: 0.7 + (parseInt(num, 10) - 1) * 0.07, duration: 0.45, ease: "easeOut" }}
  >${num}</${motion.h2}>
  <p className="col-name">${name}</p>
  <p className="col-sub">${sub}</p>
  <div className="col-rule"></div>
`

const ColLLM = ({ query, replayKey }) => {
  const ans = query.answers.llm
  const isFail = ans.status === "fail"
  return html`
    <div className="col">
      <${ColumnHeader} num="01" name="Context Window" sub="Zero prep" replayKey=${replayKey} />
      <div className="section-head">Substrate</div>
      <div className="substrate-box">
        <div className="tile-grid">
          ${LLM_TILES.map((tile, i) => {
            const isMatch = tile.matches.includes(query.id)
            const isCutoffHere = tile.post_cutoff && tile.query_target === query.id
            return html`
              <${motion.div}
                key=${`${replayKey}-${i}`}
                className=${`tile ${isMatch ? "match" : ""} ${tile.post_cutoff ? "cutoff" : ""}`}
                initial=${{ opacity: 0, scale: 0.94 }}
                animate=${{ opacity: isFail ? 0.25 : 1, scale: 1 }}
                transition=${{ delay: 0.12 + i * 0.035, duration: 0.28 }}
              >
                ${isMatch && html`
                  <${motion.div}
                    key=${`fill-${replayKey}-${i}`}
                    className="tile-fill"
                    initial=${{ scaleX: 0 }}
                    animate=${{ scaleX: 1 }}
                    transition=${{ delay: 0.55 + i * 0.05, duration: 0.55, ease: [0.25, 0.46, 0.45, 0.94] }}
                  />
                `}
                ${isCutoffHere && html`
                  <${motion.div}
                    key=${`flash-${replayKey}-${i}`}
                    style=${{ position: "absolute", inset: 0, background: "var(--ungrounded)", zIndex: 0 }}
                    initial=${{ opacity: 0 }}
                    animate=${{ opacity: [0, 0.35, 0] }}
                    transition=${{ delay: 0.5 + i * 0.05, duration: 1.1, times: [0, 0.4, 1] }}
                  />
                `}
                <div className="tile-text">${tile.text}</div>
              </${motion.div}>
            `
          })}
        </div>
      </div>
      <div className="section-head">Operation</div>
      <p className="operation-line">Training memory only. Trained once — no external lookup.</p>
      <div className="section-head">Reply</div>
      <${ReplyBox} answer=${ans} replayKey=${replayKey} delay=${1.4} />
    </div>
  `
}

const ColRAG = ({ query, replayKey }) => {
  const ans = query.answers.rag
  const ranked = useMemo(() => {
    return DOCS
      .map((d, i) => ({ i, r: d.rel[query.id] }))
      .sort((a, b) => b.r - a.r)
  }, [query])
  const topIdx = new Set(ranked.slice(0, 3).map(x => x.i))
  const rankOf = (i) => ranked.findIndex(r => r.i === i)
  const isMultihop = query.id === "multihop"

  return html`
    <div className="col">
      <${ColumnHeader} num="02" name="RAG" sub="Low prep" replayKey=${replayKey} />
      <div className="section-head">Substrate · 200K+ docs</div>
      <div className="substrate-box">
        <div className="bar-list">
          ${DOCS.map((doc, i) => {
            const isTop = topIdx.has(i)
            const r = rankOf(i)
            const score = doc.rel[query.id]
            const isExtractRisk = isMultihop && isTop && (doc.name === "drug-a-label.pdf" || doc.name === "drug-b-label.pdf")
            return html`
              <${motion.div}
                key=${`${replayKey}-${i}`}
                className=${`bar-row ${isTop ? "top" : ""} ${isExtractRisk ? "warn" : ""}`}
                initial=${{ opacity: 0 }}
                animate=${{ opacity: 1 }}
                transition=${{ delay: 0.2 + i * 0.045, duration: 0.25 }}
              >
                <span className="bar-name">${doc.name}</span>
                <div className="bar-track">
                  <${motion.div}
                    key=${`fill-${replayKey}-${i}`}
                    className="bar-fill"
                    initial=${{ scaleX: 0 }}
                    animate=${{ scaleX: score }}
                    transition=${{ delay: 0.4 + i * 0.05, duration: 0.65, ease: [0.16, 1, 0.3, 1] }}
                  />
                </div>
                <span className="bar-pct">${(score * 100).toFixed(0)}%</span>
              </${motion.div}>
            `
          })}
        </div>
        <div className="rag-tail">↓ top-3 stuffed into LLM context ↓</div>
      </div>
      <div className="section-head">Operation</div>
      <p className="operation-line">Top-K retrieval over a corpus. index → 200K docs → cosine-sim → top-3</p>
      <div className="section-head">Reply</div>
      <${ReplyBox} answer=${ans} replayKey=${replayKey} delay=${1.55} />
    </div>
  `
}

const ColKG = ({ query, replayKey }) => {
  const ans = query.answers.kg
  const highlightEdges = useMemo(() => edgesOnPath(query.pathHint), [query])
  const nodeMap = useMemo(() => Object.fromEntries(KG_NODES.map(n => [n.id, n])), [])
  const pathNodes = query.pathHint
  const isMultihop = query.id === "multihop" && ans.status === "success"

  return html`
    <div className="col">
      <${ColumnHeader} num="03" name="Knowledge Graph" sub="High prep" replayKey=${replayKey} />
      <div className="section-head">Substrate · typed entities & edges</div>
      <div className="substrate-box">
        <div className="kg-host">
          <svg viewBox="0 0 240 300" preserveAspectRatio="xMidYMid meet" className="kg-svg">
            <defs>
              <filter id="kg-glow"><feGaussianBlur stdDeviation="2"/></filter>
            </defs>

            ${KG_EDGES.map((e, i) => {
              const f = nodeMap[e.from], t = nodeMap[e.to]
              return html`
                <line key=${`b${i}`}
                  x1=${f.x} y1=${f.y} x2=${t.x} y2=${t.y}
                  stroke="#2A2722" strokeOpacity="0.18" strokeWidth="1" strokeDasharray="2,2" />
              `
            })}

            ${ans.status === "success" ? highlightEdges.map((edgeIdx, k) => {
              const e = KG_EDGES[edgeIdx]
              const f = nodeMap[e.from], t = nodeMap[e.to]
              return html`
                <${motion.line}
                  key=${`${replayKey}-h${edgeIdx}`}
                  x1=${f.x} y1=${f.y} x2=${t.x} y2=${t.y}
                  stroke="#2540C8" strokeWidth="2.2" strokeLinecap="round"
                  initial=${{ pathLength: 0, opacity: 0 }}
                  animate=${{ pathLength: 1, opacity: 1 }}
                  transition=${{ duration: 0.5, delay: 0.4 + k * 0.18 }}
                />
              `
            }) : null}

            ${isMultihop ? html`
              <${motion.circle}
                key=${`isect-${replayKey}`}
                cx=${nodeMap.n5.x} cy=${nodeMap.n5.y} r="14"
                fill="none" stroke="#2540C8" strokeWidth="1.5"
                initial=${{ opacity: 0, scale: 0.6 }}
                animate=${{ opacity: [0, 0.9, 0], scale: [0.6, 2.2, 2.6] }}
                transition=${{ delay: 1.4, duration: 1.1, times: [0, 0.4, 1] }}
                style=${{ transformOrigin: `${nodeMap.n5.x}px ${nodeMap.n5.y}px` }}
              />
            ` : null}

            ${ans.status === "fail" ? html`
              <${React.Fragment}>
                <${motion.line}
                  key=${`x1-${replayKey}`}
                  x1="85" y1="125" x2="155" y2="200"
                  stroke="#B22A2A" strokeWidth="3"
                  initial=${{ pathLength: 0 }}
                  animate=${{ pathLength: 1 }}
                  transition=${{ delay: 0.5, duration: 0.3 }}
                />
                <${motion.line}
                  key=${`x2-${replayKey}`}
                  x1="155" y1="125" x2="85" y2="200"
                  stroke="#B22A2A" strokeWidth="3"
                  initial=${{ pathLength: 0 }}
                  animate=${{ pathLength: 1 }}
                  transition=${{ delay: 0.7, duration: 0.3 }}
                />
                <${motion.text}
                  key=${`xt-${replayKey}`}
                  x="120" y="225" textAnchor="middle" fontSize="11" fontWeight="600"
                  fill="#B22A2A" fontFamily="JetBrains Mono, monospace" letterSpacing="2"
                  initial=${{ opacity: 0 }}
                  animate=${{ opacity: 1 }}
                  transition=${{ delay: 1.0, duration: 0.3 }}
                >NO PATH</${motion.text}>
              </${React.Fragment}>
            ` : null}

            ${KG_NODES.map((n) => {
              const isOnPath = pathNodes.includes(n.id) && ans.status === "success"
              return html`
                <${motion.g}
                  key=${`n-${replayKey}-${n.id}`}
                  initial=${{ opacity: 0 }}
                  animate=${{ opacity: 1 }}
                  transition=${{ delay: 0.2 + Number.parseInt(n.id.replace(/[^0-9]/g, "") || "0", 10) * 0.04, duration: 0.3 }}
                >
                  <circle
                    cx=${n.x} cy=${n.y} r=${n.r}
                    fill="var(--paper)"
                    stroke=${KIND_RING[n.kind]}
                    strokeWidth=${isOnPath ? 2 : 1.2}
                    opacity=${isOnPath ? 1 : 0.55} />
                  <circle
                    cx=${n.x} cy=${n.y} r=${n.r * 0.35}
                    fill=${KIND_RING[n.kind]}
                    opacity=${isOnPath ? 1 : 0.5} />
                  <text
                    x=${n.x} y=${n.y + n.r + 11}
                    textAnchor="middle"
                    fill=${isOnPath ? "var(--ink)" : "var(--ink-soft)"}
                    fontSize="8" fontWeight=${isOnPath ? 600 : 400}
                    fontFamily="JetBrains Mono, monospace">${n.label}</text>
                </${motion.g}>
              `
            })}
          </svg>
        </div>
      </div>
      <div className="section-head">Operation</div>
      <p className="operation-line">Typed edges + BFS over entities. Author the schema — maintain edges.</p>
      <div className="section-head">Reply</div>
      <${ReplyBox} answer=${ans} replayKey=${replayKey} delay=${1.7} />
    </div>
  `
}

const ColWiki = ({ query, replayKey }) => {
  const ans = query.answers.wiki
  return html`
    <div className="col">
      <${ColumnHeader} num="04" name="LLM Wiki" sub="Continuous prep" replayKey=${replayKey} />
      <div className="section-head">Substrate · agent-curated cards</div>
      <div className="substrate-box">
        <div className="card-grid">
          ${WIKI_CARDS.map((card, i) => {
            const isHit = card.matches.includes(query.id)
            return html`
              <${motion.div}
                key=${`${replayKey}-${i}`}
                className=${`card ${isHit ? "hit" : ""}`}
                initial=${{ opacity: 0, y: 4 }}
                animate=${{ opacity: 1, y: 0 }}
                transition=${{ delay: 0.25 + i * 0.04, duration: 0.3 }}
              >
                <div className="card-head">
                  <span># ${card.name}</span>
                  <${motion.span}
                    key=${`stamp-${replayKey}-${i}`}
                    className="card-stamp"
                    initial=${{ rotate: 0 }}
                    animate=${ isHit ? { rotate: [0, -25, 0] } : { rotate: 0 } }
                    transition=${{ delay: 0.9, duration: 0.5, ease: "easeOut" }}
                  >↻${card.updated}</${motion.span}>
                </div>
                ${card.fields.map((f, j) => html`
                  <${motion.div}
                    key=${`f-${replayKey}-${i}-${j}`}
                    className="card-field"
                    initial=${{ opacity: isHit ? 0 : 1, x: isHit ? -4 : 0 }}
                    animate=${{ opacity: 1, x: 0 }}
                    transition=${ isHit ? { delay: 0.75 + j * 0.12, duration: 0.3 } : { duration: 0 } }
                  >${f}</${motion.div}>
                `)}
              </${motion.div}>
            `
          })}
        </div>
      </div>
      <div className="section-head">Operation</div>
      <p className="operation-line">Entity-cards · pre-cooked & cited. Agents read & write between sessions.</p>
      <div className="section-head">Reply</div>
      <${ReplyBox} answer=${ans} replayKey=${replayKey} delay=${1.85} />
    </div>
  `
}

const QueryBlock = ({ query, queryIdx, onPrev, onNext, onReplay, typeKey }) => {
  const [visible, setVisible] = useState("")
  useEffect(() => {
    let i = 0
    setVisible("")
    let timer
    const tick = () => {
      i++
      setVisible(query.text.slice(0, i))
      if (i < query.text.length) timer = setTimeout(tick, 22)
    }
    timer = setTimeout(tick, 22)
    return () => clearTimeout(timer)
  }, [query.text, typeKey])

  return html`
    <div className="query-block">
      <div className="query-row">
        <span className="query-label">Sample Query · ${queryIdx + 1}/${QUERIES.length}</span>
        <span className="query-kind">${query.label}</span>
      </div>
      <div className="query-text">
        ${visible}<span className="cursor">▎</span>
      </div>
      <div className="query-nav">
        <button className="nav-btn" onClick=${onPrev}>◀ Prev</button>
        <button className="nav-btn" onClick=${onNext}>Next ▶</button>
        <button className="nav-btn replay" onClick=${onReplay}>⟳ Replay</button>
      </div>
    </div>
  `
}

const TakeawayRow = ({ query, replayKey }) => {
  const cols = [
    { key: "llm",  status: query.answers.llm.status,  text: query.answers.llm.takeaway  },
    { key: "rag",  status: query.answers.rag.status,  text: query.answers.rag.takeaway  },
    { key: "kg",   status: query.answers.kg.status,   text: query.answers.kg.takeaway   },
    { key: "wiki", status: query.answers.wiki.status, text: query.answers.wiki.takeaway },
  ]
  return html`
    <div className="takeaways">
      ${cols.map((c, i) => {
        const s = STATUS[c.status]
        return html`
          <${motion.div}
            key=${`tk-${replayKey}-${i}`}
            className="takeaway-cell"
            initial=${{ opacity: 0, y: 6 }}
            animate=${{ opacity: 1, y: 0 }}
            transition=${{ delay: 2.2 + i * 0.12, duration: 0.35, ease: "easeOut" }}
          >
            <div className=${`takeaway-marker ${s.cls}`}></div>
            <div className="takeaway-head">Interpretation</div>
            <div className="takeaway-text">${c.text}</div>
          </${motion.div}>
        `
      })}
    </div>
  `
}

const FootAxis = ({ query, replayKey }) => {
  const arches = [
    { key: "llm",  label: "Context Window" },
    { key: "rag",  label: "RAG" },
    { key: "kg",   label: "Knowledge Graph" },
    { key: "wiki", label: "LLM Wiki" },
  ]
  const successFlags = arches.map(a => query.answers[a.key].status === "success")
  const winnerIdx = successFlags.lastIndexOf(true)

  return html`
    <footer className="axis">
      <div className="axis-label">← Less upfront work</div>
      <div className="axis-dots">
        ${arches.map((a, i) => html`
          <${motion.div}
            key=${`dot-${replayKey}-${i}`}
            className="axis-dot"
            initial=${{ scale: 0.6, opacity: 0.4 }}
            animate=${ i === winnerIdx
              ? { scale: [0.6, 1.6, 1.0], opacity: [0.4, 1, 1], backgroundColor: ["var(--ink-faint)", "var(--grounded)", "var(--grounded)"] }
              : successFlags[i]
                ? { scale: 1, opacity: 1, backgroundColor: "var(--ink)" }
                : { scale: 1, opacity: 0.7, backgroundColor: "var(--ink-faint)" }
            }
            transition=${{ delay: 1.5 + i * 0.15, duration: 0.4, ease: "easeOut" }}
          />
        `)}
      </div>
      <div className="axis-label right">More upfront work →</div>
    </footer>
  `
}

const App = () => {
  const [queryIdx, setQueryIdx] = useState(0)
  const [replayKey, setReplayKey] = useState(0)
  const query = QUERIES[queryIdx]

  const replay = () => {
    setQueryIdx(0)
    setReplayKey(k => k + 1)
  }
  const cycle = (dir) => {
    setQueryIdx((i) => (i + dir + QUERIES.length) % QUERIES.length)
    setReplayKey(k => k + 1)
  }
  const typeKey = `${queryIdx}-${replayKey}`

  return html`
    <div className="page">
      <header className="main">
        <div>
          <div className="bulletin">Bulletin #01 · Context Architectures · A Comparison</div>
          <h1 className="title">
            Four ways<br/>
            to answer <span className="accent">one</span> question.
          </h1>
        </div>
        <${QueryBlock}
          query=${query}
          queryIdx=${queryIdx}
          onPrev=${() => cycle(-1)}
          onNext=${() => cycle(1)}
          onReplay=${replay}
          typeKey=${typeKey}
        />
      </header>

      <div className="columns">
        <${ColLLM}  query=${query} replayKey=${typeKey} />
        <${ColRAG}  query=${query} replayKey=${typeKey} />
        <${ColKG}   query=${query} replayKey=${typeKey} />
        <${ColWiki} query=${query} replayKey=${typeKey} />
      </div>

      <${TakeawayRow} query=${query} replayKey=${typeKey} />

      <${FootAxis} query=${query} replayKey=${typeKey} />
    </div>
  `
}

createRoot(document.getElementById("root")).render(html`<${App} />`)
</script>
</body>
</html>
